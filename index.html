<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Event Hub</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin: 0;
        }

        .btn {
            margin-top: 10px;
            padding: 10px;
            border: none;
            background: #3498db;
            color: white;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
        }

        .btn:hover {
            background: #2980b9;
        }
    </style>
</head>

<body>

<header>🎉 Smart Event Hub</header>

<div class="container" id="events"></div>

<script>

async function loadEvents() {
    let res = await fetch("http://127.0.0.1:5001/events");
    let events = await res.json();

    let container = document.getElementById("events");

    events.forEach(event => {

        let div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <h3>${event.name}</h3>
            <p>📍 ${event.location}</p>
            <p>📅 ${event.date}</p>
            <p>💰 ₹${event.price}</p>
            <button class="btn" onclick="payNow('${event.name}', ${event.price})">
                Book Now
            </button>
        `;

        container.appendChild(div);
    });
}

async function payNow(eventName, price) {

    // Create order
    let response = await fetch("http://127.0.0.1:5001/create-order", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ amount: price })
    });

    let order = await response.json();

    var options = {
        "key": "rzp_test_SZosMAy6eYmFqz",
        "amount": order.amount,
        "currency": "INR",
        "name": "Smart Event Hub",
        "description": eventName,
        "order_id": order.id,

        "handler": async function (response){

            alert("Payment Successful!");

            await fetch("http://127.0.0.1:5001/book-event", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    user_email: "anish@test.com",
                    event_name: eventName,
                    payment_id: response.razorpay_payment_id,
                    payment_status: "success"
                })
            });

            alert("Booking Confirmed 🎟️");
        }
    };

    var rzp = new Razorpay(options);
    rzp.open();
}

loadEvents();

</script>

</body>
</html>
